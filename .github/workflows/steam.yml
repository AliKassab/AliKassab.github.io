name: Update Steam Showcase

on:
  schedule:
    - cron: '17 6 * * *' # daily, ~06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: steam-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify secret is present
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        run: |
          if [[ -z "${STEAM_API_KEY}" ]]; then
            echo "::error::STEAM_API_KEY is empty. Add it under Settings -> Secrets and variables -> Actions -> the Secrets tab (not Variables), named exactly STEAM_API_KEY."
            exit 1
          fi
          echo "STEAM_API_KEY is present (length: ${#STEAM_API_KEY})."

      - name: Fetch Steam data
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        run: node scripts/fetch-steam.mjs

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain steam-data.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add steam-data.json
            git commit -m "Update Steam showcase data [skip ci]"
            git push
          else
            echo "steam-data.json unchanged"
          fi
